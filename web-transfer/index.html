<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>简声网站传书</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f7f7fb;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d8dbe4;
      --primary: #0a84ff;
      --primary-pressed: #006fd6;
      --disabled: #9ca3af;
      --success: #117a37;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: var(--background);
      color: var(--text);
    }

    main {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 32px 20px 40px;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      line-height: 1.2;
      margin: 0 0 10px;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    form {
      background: var(--surface);
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08), 0 12px 28px rgba(15, 23, 42, 0.06);
    }

    label {
      display: block;
      font-size: 18px;
      font-weight: 700;
      margin: 20px 0 8px;
    }

    label:first-child {
      margin-top: 0;
    }

    input,
    button {
      width: 100%;
      font: inherit;
      font-size: 20px;
      min-height: 56px;
      border-radius: 8px;
    }

    input {
      border: 1px solid var(--border);
      padding: 12px 14px;
      background: white;
      color: var(--text);
    }

    input:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(10, 132, 255, 0.35);
      outline-offset: 2px;
    }

    input[type="file"] {
      padding: 10px;
    }

    button {
      border: 0;
      background: var(--primary);
      color: white;
      font-weight: 700;
      margin-top: 22px;
      cursor: pointer;
    }

    button:active {
      background: var(--primary-pressed);
    }

    button:disabled {
      background: var(--disabled);
      cursor: wait;
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    #status {
      min-height: 28px;
      margin: 20px 0 0;
      font-size: 18px;
      line-height: 1.5;
      color: var(--muted);
    }

    #status.success {
      color: var(--success);
      font-weight: 700;
    }

    #status.error {
      color: var(--danger);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>简声网站传书</h1>
      <p class="intro">输入 App 中的传书码，选择 TXT 或 EPUB 文件，即可发送到对应设备。</p>
    </header>

    <form id="form">
      <label for="code">传书码</label>
      <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" maxlength="8" pattern="[0-9]{8}" required>
      <p class="hint">传书码长期有效，上传后的文件保留 72 小时。</p>

      <label for="file">选择书籍文件</label>
      <input id="file" name="file" type="file" accept=".txt,.epub,text/plain,application/epub+zip" required>
      <p class="hint">当前支持 TXT 和 EPUB，单个文件最大 250 MB。</p>

      <button id="submit" type="submit">上传到 App</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const apiBase = "https://nzksxspznpkquybprqms.supabase.co/functions/v1/transfer";
    const form = document.getElementById("form");
    const status = document.getElementById("status");
    const submit = document.getElementById("submit");

    function setStatus(message, kind = "") {
      status.textContent = message;
      status.className = kind;
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error?.message || "请求失败");
      return payload;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submit.disabled = true;
      setStatus("正在验证传书码");
      try {
        const code = document.getElementById("code").value.trim();
        const file = document.getElementById("file").files[0];
        if (!file) throw new Error("请选择要上传的书籍文件。");

        const session = await postJson(`${apiBase}/web/resolve-code`, { code });
        const data = new FormData();
        data.append("uploadSessionId", session.uploadSessionId);
        data.append("file", file);

        setStatus("正在上传文件");
        const upload = await fetch(`${apiBase}/web/upload`, {
          method: "POST",
          body: data,
        });
        const payload = await upload.json();
        if (!upload.ok) throw new Error(payload.error?.message || "上传失败");

        setStatus(`上传成功：${payload.filename}。请回到简声 App 刷新接收。`, "success");
        form.reset();
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
